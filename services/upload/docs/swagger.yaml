basePath: /
definitions:
  controller.PresignRequest:
    properties:
      title:
        type: string
      user_id:
        type: string
    type: object
  controller.PresignResponse:
    properties:
      upload_url:
        type: string
      video_id:
        type: string
    type: object
  controller.UploadResponse:
    properties:
      key:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API for uploading video files to object storage (S3 or MinIO).
  title: Upload Service API
  version: "1.0"
paths:
  /videos/{video_id}/upload/finalize:
    post:
      description: Call after the client has uploaded the file to the presigned URL.
        Updates upload (storage_path, status) and sends event to upload-process queue.
      parameters:
      - description: Video ID
        in: path
        name: video_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: Bad request (e.g. upload not found or not pending)
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Finalize upload
      tags:
      - upload
  /videos/upload:
    post:
      consumes:
      - multipart/form-data
      description: Upload a file. Use multipart form with field name `file`. Accepted
        extensions are service-defined (e.g. video formats).
      parameters:
      - description: File to upload
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "201":
          description: Created, returns object key
          schema:
            $ref: '#/definitions/controller.UploadResponse'
        "400":
          description: Bad request (e.g. invalid extension)
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Upload a file
      tags:
      - upload
  /videos/upload/presign:
    post:
      consumes:
      - application/json
      description: 'Returns a presigned PUT URL and video_id. Client uploads the file
        with PUT to the URL. Body: user_id, title.'
      parameters:
      - description: user_id and title
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/controller.PresignRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controller.PresignResponse'
        "400":
          description: Bad request (e.g. missing user_id)
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Request presigned upload URL
      tags:
      - upload
swagger: "2.0"
