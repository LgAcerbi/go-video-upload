services:
  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3
      DEBUG: "0"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4566/_localstack/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  localstack-init:
    image: amazon/aws-cli:latest
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
    volumes:
      - ./localstack/cors.json:/cors.json:ro
    entrypoint: >
      /bin/sh -c "
      aws --endpoint-url=http://localstack:4566 s3 mb s3://videos --region us-east-1 2>/dev/null || true;
      aws --endpoint-url=http://localstack:4566 s3api put-bucket-cors --bucket videos --cors-configuration file:///cors.json;
      echo 'LocalStack bucket videos ready with CORS';
      "

  influxdb:
    image: influxdb:2
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: admin
      DOCKER_INFLUXDB_INIT_ORG: org
      DOCKER_INFLUXDB_INIT_BUCKET: metrics
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: dev-influxdb-token
    volumes:
      - influxdb-data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: admin
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d admin"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  adminer:
    image: adminer:latest
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy

  upload:
    build:
      context: ..
      dockerfile: services/upload/Dockerfile
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      PORT: "8080"
      GRPC_PORT: "9090"
      OBJECT_STORAGE: S3
      S3_ENDPOINT: http://localstack:4566
      S3_PRESIGN_ENDPOINT: http://localhost:4566
      S3_REGION: us-east-1
      S3_BUCKET: videos
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: admin
      RABBITMQ_PASS: admin
      DATABASE_URL: postgresql://admin:admin@postgres:5432/admin
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: dev-influxdb-token
      INFLUXDB_ORG: org
      INFLUXDB_BUCKET: metrics
    depends_on:
      localstack-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      influxdb:
        condition: service_healthy

  metadata:
    build:
      context: ..
      dockerfile: services/metadata/Dockerfile
    ports:
      - "50051:50051"
    environment:
      UPLOAD_GRPC_TARGET: upload:9090
      S3_ENDPOINT: http://localstack:4566
      S3_REGION: us-east-1
      S3_BUCKET: videos
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: admin
      RABBITMQ_PASS: admin
    depends_on:
      upload:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  orchestrator:
    build:
      context: ..
      dockerfile: services/orchestrator/Dockerfile
    environment:
      UPLOAD_GRPC_TARGET: upload:9090
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: admin
      RABBITMQ_PASS: admin
    depends_on:
      upload:
        condition: service_started
      rabbitmq:
        condition: service_healthy

  transcode:
    build:
      context: ..
      dockerfile: services/transcode/Dockerfile
    ports:
      - "50052:50052"

  e2e-client:
    build:
      context: ../e2e-client
      dockerfile: Dockerfile
      args:
        VITE_UPLOAD_API_URL: http://localhost:8080
    ports:
      - "3000:80"
    depends_on:
      - upload

volumes:
  postgres-data:
  influxdb-data:
