services:
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for MinIO to accept connections...';
      sleep 10;
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      n=0; max=60;
      until mc ready myminio 2>/dev/null; do
        n=$$(($$n + 1));
        if [ $$n -ge $$max ]; then echo 'MinIO did not become ready in 2 minutes'; exit 1; fi;
        echo 'Waiting for MinIO... ($$n/$$max)'; sleep 2;
      done;
      mc mb myminio/videos --ignore-existing;
      echo 'Bucket videos ready';
      exit 0;
      "

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"   # AMQP
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: admin
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d admin"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  adminer:
    image: adminer:latest
    ports:
      - "8081:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy

  upload:
    build:
      context: ..
      dockerfile: services/upload/Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      OBJECT_STORAGE: MINIO
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: videos
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
      DATABASE_URL: postgresql://admin:admin@postgres:5432/admin
    depends_on:
      minio-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy

  metadata:
    build:
      context: ..
      dockerfile: services/metadata/Dockerfile
    ports:
      - "50051:50051"

  transcoding:
    build:
      context: ..
      dockerfile: services/transcoding/Dockerfile
    ports:
      - "50052:50052"

volumes:
  minio-data:
  postgres-data:
