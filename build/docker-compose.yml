# Application services. Start after infra is running.
# Usage: docker-compose -f build/docker-compose.yml -p video up -d
# Assumes: localstack, rabbitmq, postgres, influxdb are already up (same -p video).
# First time: run once to create DB tables: docker-compose -f build/docker-compose.yml -p video run --rm db-schema

services:
  db-schema:
    image: postgres:16-alpine
    volumes:
      - ../scripts/create_tables.sql:/scripts/create_tables.sql:ro
    environment:
      PGPASSWORD: admin
    command: ["psql", "-h", "postgres", "-U", "admin", "-d", "admin", "-f", "/scripts/create_tables.sql"]
    restart: "no"
    profiles:
      - tools

  upload:
    build:
      context: ..
      dockerfile: services/upload/Dockerfile
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      PORT: "8080"
      GRPC_PORT: "9090"
      OBJECT_STORAGE: S3
      S3_ENDPOINT: http://localstack:4566
      S3_PRESIGN_ENDPOINT: http://localhost:4566
      S3_REGION: us-east-1
      S3_BUCKET: videos
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: admin
      RABBITMQ_PASS: admin
      DATABASE_URL: postgresql://admin:admin@postgres:5432/admin
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: acerbi-dev-influxdb-token
      INFLUXDB_ORG: acerbi-dev
      INFLUXDB_BUCKET: metrics

  metadata:
    build:
      context: ..
      dockerfile: services/metadata/Dockerfile
    ports:
      - "50051:50051"
    environment:
      UPLOAD_GRPC_TARGET: upload:9090
      S3_ENDPOINT: http://localstack:4566
      S3_REGION: us-east-1
      S3_BUCKET: videos
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: admin
      RABBITMQ_PASS: admin
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: acerbi-dev-influxdb-token
      INFLUXDB_ORG: acerbi-dev
      INFLUXDB_BUCKET: metrics

  orchestrator:
    build:
      context: ..
      dockerfile: services/orchestrator/Dockerfile
    environment:
      UPLOAD_GRPC_TARGET: upload:9090
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: admin
      RABBITMQ_PASS: admin
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: acerbi-dev-influxdb-token
      INFLUXDB_ORG: acerbi-dev
      INFLUXDB_BUCKET: metrics

  transcode:
    build:
      context: ..
      dockerfile: services/transcode/Dockerfile
    depends_on:
      - upload
    environment:
      UPLOAD_GRPC_TARGET: upload:9090
      S3_ENDPOINT: http://localstack:4566
      S3_REGION: us-east-1
      S3_BUCKET: videos
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: admin
      RABBITMQ_PASS: admin
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: acerbi-dev-influxdb-token
      INFLUXDB_ORG: acerbi-dev
      INFLUXDB_BUCKET: metrics

  e2e-client:
    build:
      context: ../e2e-client
      dockerfile: Dockerfile
      args:
        VITE_UPLOAD_API_URL: http://localhost:8080
    ports:
      - "3000:80"
