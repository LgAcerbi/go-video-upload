services:
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      until mc ready myminio 2>/dev/null; do echo 'Waiting for MinIO...'; sleep 2; done;
      mc mb myminio/videos --ignore-existing;
      echo 'Bucket videos ready';
      exit 0;
      "

  upload:
    build:
      context: ..
      dockerfile: services/upload/Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      OBJECT_STORAGE: MINIO
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: videos
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    depends_on:
      minio-init:
        condition: service_completed_successfully

  metadata:
    build:
      context: ..
      dockerfile: services/metadata/Dockerfile
    ports:
      - "50051:50051"

  transcoding:
    build:
      context: ..
      dockerfile: services/transcoding/Dockerfile
    ports:
      - "50052:50052"

volumes:
  minio-data:
