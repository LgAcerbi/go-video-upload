syntax = "proto3";

package upload;

option go_package = "github.com/LgAcerbi/go-video-upload/proto/upload";

// UploadStateService is used by workers and the orchestrator to update video/upload state.
// Only the upload service writes to videos, uploads, and upload_steps; workers call this over gRPC.
service UploadStateService {
  rpc GetUploadProcessingContext(GetUploadProcessingContextRequest) returns (GetUploadProcessingContextResponse);
  rpc UpdateUploadStatus(UpdateUploadStatusRequest) returns (UpdateUploadStatusResponse);
  rpc UpdateUploadStep(UpdateUploadStepRequest) returns (UpdateUploadStepResponse);
  rpc UpdateVideoMetadata(UpdateVideoMetadataRequest) returns (UpdateVideoMetadataResponse);
  rpc UpdateVideoThumbnail(UpdateVideoThumbnailRequest) returns (UpdateVideoThumbnailResponse);
  rpc CreateUploadSteps(CreateUploadStepsRequest) returns (CreateUploadStepsResponse);
  rpc CreateRenditions(CreateRenditionsRequest) returns (CreateRenditionsResponse);
  rpc ListPendingRenditions(ListPendingRenditionsRequest) returns (ListPendingRenditionsResponse);
  rpc UpdateRendition(UpdateRenditionRequest) returns (UpdateRenditionResponse);
  rpc ExpireStaleUploads(ExpireStaleUploadsRequest) returns (ExpireStaleUploadsResponse);
}

message GetUploadProcessingContextRequest {
  string upload_id = 1;
}

// Returned only when upload exists and deleted_at IS NULL.
message GetUploadProcessingContextResponse {
  string upload_id = 1;
  string video_id = 2;
  string storage_path = 3;
  string status = 4;
  int64 created_at_unix_sec = 5;
  int64 updated_at_unix_sec = 6;
  int64 expires_at_unix_sec = 7;  // 0 if not set
}

message UpdateUploadStatusRequest {
  string upload_id = 1;
  string status = 2;  // e.g. "processing", "finished", "failed"
}

message UpdateUploadStatusResponse {}

message UpdateUploadStepRequest {
  string upload_id = 1;
  string step = 2;         // e.g. "metadata", "transcode", "thumbnail", "moderation"
  string status = 3;      // e.g. "running", "done", "failed"
  string error_message = 4;  // optional, for failures
}

message UpdateUploadStepResponse {}

message UpdateVideoMetadataRequest {
  string video_id = 1;
  string format = 2;       // container/codec from metadata extraction (empty = no change)
  double duration_sec = 3; // 0 = no change
  string status = 4;       // e.g. "ready" when pipeline completes (empty = no change)
}

message UpdateVideoMetadataResponse {}

message UpdateVideoThumbnailRequest {
  string video_id = 1;
  string thumbnail_storage_path = 2;
}

message UpdateVideoThumbnailResponse {}

message CreateUploadStepsRequest {
  string upload_id = 1;
  repeated string steps = 2;  // e.g. ["metadata", "transcode", "thumbnail", "moderation"]
}

message CreateUploadStepsResponse {}

message CreateRenditionsRequest {
  string video_id = 1;
  string original_storage_path = 2;
  int32 original_width = 3;
  int32 original_height = 4;
  repeated int32 target_heights = 5;  // e.g. [720, 480, 360]
}

message CreateRenditionsResponse {}

message ListPendingRenditionsRequest {
  string video_id = 1;
}

message PendingRendition {
  string resolution = 1;  // e.g. "720p"
  int32 height = 2;
}

message ListPendingRenditionsResponse {
  repeated PendingRendition renditions = 1;
}

message UpdateRenditionRequest {
  string video_id = 1;
  string resolution = 2;   // e.g. "720p"
  string storage_path = 3;
  int32 width = 4;         // 0 = no change
  int32 height = 5;        // 0 = no change
  int32 bitrate_kbps = 6;  // 0 = no change
  string format = 7;       // e.g. "mp4", empty = no change
}

message UpdateRenditionResponse {}

message ExpireStaleUploadsRequest {
  int32 limit = 1; // max uploads to expire in this run (0 = server default)
}

message ExpireStaleUploadsResponse {
  int32 found = 1;
  int32 expired = 2;
  int32 skipped = 3;
}
